openapi: 3.0.4
info:
  title: "rmcluster server"
  version: 0.0.1

paths:
  /nodes:
    get:
      summary: List all nodes
      responses:
        200:
          description: "A JSON array of nodes"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    ip:
                      type: string